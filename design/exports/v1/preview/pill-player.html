<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #170027; font-family: var(--fpl-font-display); color: var(--fpl-text); }
  body { padding: 20px; box-sizing: border-box; min-height: 180px; }
  .row { display: flex; gap: 14px; align-items: stretch; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .annot { font-family: var(--fpl-font-mono); font-size: 10px; color: var(--fpl-muted); margin-top: 6px; }
  .btn-primary {
    height: 56px; padding: 0 24px; border-radius: 12px; border: none;
    background: var(--fpl-accent); color: var(--fpl-accent-ink);
    font: 700 16px var(--fpl-font-display); letter-spacing: -0.01em;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    white-space: nowrap;
  }
  .btn-primary[disabled] { background: var(--fpl-bg-soft); color: var(--fpl-muted-soft); cursor: not-allowed; }
  .btn-pill {
    height: 44px; padding: 0 20px; border-radius: 999px; border: none;
    background: var(--fpl-accent); color: var(--fpl-accent-ink);
    font: 700 14px var(--fpl-font-display);
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  }
  .link {
    background: transparent; border: none; padding: 6px 4px;
    font: 700 14px var(--fpl-font-display); letter-spacing: -0.01em;
    color: var(--fpl-accent); cursor: pointer;
  }
  .arrow-btn {
    width: 36px; height: 36px; border-radius: 999px;
    background: rgba(0,255,135,0.12); border: 1px solid var(--fpl-accent);
    display: grid; place-items: center; cursor: pointer;
  }
  .arrow-btn[disabled] { background: rgba(255,255,255,0.05); border-color: var(--fpl-bg-hair); opacity: 0.5; cursor: not-allowed; }
  .input {
    height: 56px; border-radius: 12px; background: var(--fpl-bg);
    border: 1.5px solid var(--fpl-bg-hair); padding: 0 18px;
    display: flex; align-items: center;
    font-family: var(--fpl-font-mono); font-size: 18px; color: var(--fpl-text);
  }
  .input.is-error { border-color: var(--fpl-error); box-shadow: 0 0 0 3px var(--fpl-error-soft); color: var(--fpl-error); }
  .input.is-empty { color: var(--fpl-muted-soft); }
</style>
</head><body>
    <div class="row" style="gap: 32px; align-items: center;">
      <div class="col" style="align-items: center; gap: 4px;">
        <svg width="42" height="54" viewBox="0 0 66 87" style="filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));">
          <path d="M9 18 L2 28 L2 44 L13 47 L17 30 Z" fill="#FFFFFF"/>
          <path d="M57 18 L64 28 L64 44 L53 47 L49 30 Z" fill="#FFFFFF"/>
          <path d="M17 18 L26 14 L29 19 L37 19 L40 14 L49 18 L52 78 L46 84 L20 84 L14 78 Z" fill="#EF0107"/>
          <path d="M29 19 L33 27 L37 19 L36 18 L33 23 L30 18 Z" fill="#FFFFFF"/>
        </svg>
        <div style="display: flex; flex-direction: column; align-items: stretch; background: var(--fpl-pill-bg); border-radius: 5px; overflow: hidden; box-shadow: var(--fpl-shadow-pill-soft); min-width: 80px;">
          <div style="background: var(--fpl-pill-bg); color: #fff; font: 600 11px var(--fpl-font-display); padding: 3px 8px; text-align: center;">Saka</div>
          <div style="background: var(--fpl-accent); color: var(--fpl-accent-ink); font: 700 11px var(--fpl-font-display); padding: 2px 8px; text-align: center; font-variant-numeric: tabular-nums;">14</div>
        </div>
      </div>
      <div class="col" style="gap: 4px;">
        <div style="font: 600 13px var(--fpl-font-display); color: var(--fpl-text);">Player pill</div>
        <div style="font-family: var(--fpl-font-mono); font-size: 10px; color: var(--fpl-muted); line-height: 1.6;">
          jersey · 54px<br/>
          name row · pill-bg #3D1A55 · text 600/11px<br/>
          pts row · accent #00FF87 · ink 700/11px<br/>
          radius 5 · pill-soft shadow
        </div>
      </div>
    </div></body></html>
