<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FPL Squad Viewer — Design Sheet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; padding:0; background:#f0eee9; height:100%; }
    body { font-family: "Space Grotesk", -apple-system, system-ui, sans-serif; }
    @keyframes fplShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    /* keep design canvas card backgrounds white inside our artboards */
    .dc-card { background: transparent !important; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel" data-presets="react">
    const W = 390, H = 844;
    const DCanvas = window.DesignCanvas;
    const DCSec   = window.DCSection;
    const DCArt   = window.DCArtboard;

    function App() {
      return (
        <DCanvas>
          <DCSec
            id="entry"
            title="Entry screen"
            subtitle="Mobile · 390×844 · 3 states">
            <DCArt id="entry-idle"     label="A · Idle"             width={W} height={H}>
              <EntryScreen state="idle"/>
            </DCArt>
            <DCArt id="entry-invalid"  label="B · Validation error" width={W} height={H}>
              <EntryScreen state="invalid"/>
            </DCArt>
            <DCArt id="entry-notfound" label="C · Not found"        width={W} height={H}>
              <EntryScreen state="notFound"/>
            </DCArt>
          </DCSec>

          <DCSec
            id="squad"
            title="Squad screen"
            subtitle="Mobile · 390×844 · 3 states">
            <DCArt id="squad-loading" label="A · Loading"        width={W} height={H}>
              <SquadScreen state="loading"/>
            </DCArt>
            <DCArt id="squad-loaded"  label="B · Loaded"         width={W} height={H}>
              <SquadScreen state="loaded"/>
            </DCArt>
            <DCArt id="squad-empty"   label="C · Empty gameweek" width={W} height={H}>
              <SquadScreen state="empty"/>
            </DCArt>
          </DCSec>
        </DCanvas>
      );
    }

    // The babel scripts load asynchronously — wait until screens.jsx has
    // exported its components onto window before mounting.
    function tryMount() {
      if (!window.EntryScreen || !window.SquadScreen || !window.DesignCanvas) {
        return setTimeout(tryMount, 30);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    }
    tryMount();
  </script>
</body>
</html>
