<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FPL Squad Viewer — Favicon options</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bgDeep:#170027; --bg:#220035; --bgSoft:#2D0844; --bgHair:#3D1A55;
      --accent:#00FF87; --accentDeep:#04E36A; --ink:#170027;
      --text:#fff; --muted:#A89BBA; --mutedSoft:#7A6B8E;
      --pitchA:#1FA64B; --pitchB:#17933E;
      --disp:"Space Grotesk",-apple-system,system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,monospace;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;background:#0F0019;color:var(--text);font-family:var(--disp);}
    .wrap{max-width:1180px;margin:0 auto;padding:56px 40px 96px;}
    .head{margin-bottom:40px;}
    .kicker{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 10px;}
    h1{font-size:34px;font-weight:700;letter-spacing:-.025em;margin:0 0 12px;}
    .sub{font-size:15px;color:var(--muted);line-height:1.55;max-width:620px;margin:0;}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:44px;}
    .card{background:var(--bg);border:1px solid var(--bgHair);border-radius:16px;padding:22px 22px 20px;display:flex;flex-direction:column;gap:18px;}
    .card-top{display:flex;align-items:center;justify-content:space-between;}
    .num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--mutedSoft);letter-spacing:.04em;}
    .name{font-size:13px;font-weight:600;color:var(--muted);}
    .stage{display:flex;align-items:center;gap:24px;}
    .hero{width:96px;height:96px;border-radius:21px;flex-shrink:0;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04);}
    .hero svg, .sz svg{display:block;width:100%;height:100%;}
    .sizes{display:flex;align-items:center;gap:20px;}
    .szcol{display:flex;flex-direction:column;align-items:center;gap:7px;}
    .sz{border-radius:6px;overflow:hidden;background:transparent;}
    .sz.s32{width:32px;height:32px;border-radius:7px;}
    .sz.s16{width:16px;height:16px;border-radius:4px;}
    .szlbl{font-family:var(--mono);font-size:9.5px;color:var(--mutedSoft);}
    /* fake browser tab */
    .tab{display:flex;align-items:center;gap:8px;background:#2A2A2E;border-radius:9px 9px 0 0;padding:8px 12px;width:100%;border:1px solid #000;border-bottom:none;}
    .tab .fav{width:16px;height:16px;border-radius:4px;overflow:hidden;flex-shrink:0;}
    .tab .ttl{font-size:12.5px;color:#E8E8EA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
    .tab .x{margin-left:auto;color:#8A8A8E;font-size:14px;line-height:1;}
    .tabwrap{padding-top:2px;}
    .note{font-size:11.5px;color:var(--mutedSoft);line-height:1.5;margin:0;}
    .legend{margin-top:8px;font-size:12.5px;color:var(--muted);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <p class="kicker">FPL Squad Viewer</p>
      <h1>Browser icon — 10 options</h1>
      <p class="sub">All on the brand stack: deep purple <strong style="color:#fff">#170027</strong> and neon green <strong style="color:var(--accent)">#00FF87</strong>. Each shows large, the real 32&nbsp;px / 16&nbsp;px sizes, and a browser-tab mock so you can judge legibility at tiny sizes. Tell me the number you like.</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
  // ── Icon definitions. Each returns inner SVG markup for a 64×64 viewBox. ──
  // Colors
  const C = { deep:'#170027', bg:'#220035', soft:'#2D0844', hair:'#3D1A55',
    accent:'#00FF87', accentDeep:'#04E36A', ink:'#170027', white:'#fff',
    pitchA:'#1FA64B', pitchB:'#17933E', line:'rgba(255,255,255,.85)' };

  // Helper: rounded-square background
  const bg = (fill) => `<rect width="64" height="64" rx="14" fill="${fill}"/>`;

  const ICONS = [
    {
      name:'Bold "F" monogram',
      svg:`${bg(C.deep)}
        <text x="32" y="46" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="44" fill="${C.accent}" letter-spacing="-2">F</text>`
    },
    {
      name:'Green tile · dark "F"',
      svg:`${bg(C.accent)}
        <text x="32" y="46" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="44" fill="${C.ink}" letter-spacing="-2">F</text>`
    },
    {
      name:'Jersey / kit',
      svg:`${bg(C.deep)}
        <g transform="translate(11,12)">
          <path d="M14 2 L20 0 L22 5 L26 5 L28 0 L34 2 L40 8 L34 14 L31 11 L31 40 L11 40 L11 11 L8 14 L2 8 Z"
            fill="${C.accent}"/>
          <path d="M20 0 L24 8 L28 0 L26 -0.5 L24 4 L22 -0.5 Z" fill="${C.deep}"/>
        </g>`
    },
    {
      name:'Pitch + center circle',
      svg:`<rect width="64" height="64" rx="14" fill="${C.pitchB}"/>
        <rect y="0" width="64" height="16" fill="${C.pitchA}"/>
        <rect y="32" width="64" height="16" fill="${C.pitchA}"/>
        <line x1="6" y1="32" x2="58" y2="32" stroke="${C.line}" stroke-width="2.2"/>
        <circle cx="32" cy="32" r="11" fill="none" stroke="${C.line}" stroke-width="2.2"/>
        <circle cx="32" cy="32" r="2.4" fill="${C.line}"/>
        <rect x="3.5" y="3.5" width="57" height="57" rx="11" fill="none" stroke="${C.line}" stroke-width="2"/>`
    },
    {
      name:'Football (hex panels)',
      svg:`${bg(C.deep)}
        <circle cx="32" cy="32" r="20" fill="${C.white}"/>
        <path d="M32 20 L40 26 L37 36 L27 36 L24 26 Z" fill="${C.ink}"/>
        <path d="M32 12 L32 20 M40 26 L48 22 M37 36 L43 44 M27 36 L21 44 M24 26 L16 22"
          stroke="${C.ink}" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="20" fill="none" stroke="${C.accent}" stroke-width="3"/>`
    },
    {
      name:'Lightning bolt (FPL energy)',
      svg:`${bg(C.deep)}
        <path d="M36 8 L20 36 L30 36 L26 56 L44 26 L33 26 L38 8 Z"
          fill="${C.accent}" stroke="${C.deep}" stroke-width="1.5" stroke-linejoin="round"/>`
    },
    {
      name:'Captain armband "C"',
      svg:`${bg(C.deep)}
        <circle cx="32" cy="32" r="20" fill="none" stroke="${C.accent}" stroke-width="5"/>
        <text x="32" y="42" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="26" fill="${C.accent}">C</text>`
    },
    {
      name:'Points pill "11"',
      svg:`${bg(C.deep)}
        <rect x="10" y="22" width="44" height="20" rx="10" fill="${C.accent}"/>
        <text x="32" y="37" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="800" font-size="16" fill="${C.ink}">11</text>`
    },
    {
      name:'Shirt number "10"',
      svg:`${bg(C.accent)}
        <g transform="translate(8,9)">
          <path d="M16 3 L22 1 L24 6 L24 6 L24 1 L30 1 L32 6 L38 8 L43 14 L37 19 L34 16 L34 44 L14 44 L14 16 L11 19 L5 14 L10 8 Z"
            fill="${C.deep}"/>
        </g>
        <text x="32" y="40" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="17" fill="${C.accent}">10</text>`
    },
    {
      name:'Goal net + ball',
      svg:`${bg(C.deep)}
        <g stroke="${C.accent}" stroke-width="1.6" opacity="0.55">
          <line x1="14" y1="16" x2="14" y2="48"/><line x1="22" y1="16" x2="22" y2="48"/>
          <line x1="32" y1="16" x2="32" y2="48"/><line x1="42" y1="16" x2="42" y2="48"/>
          <line x1="50" y1="16" x2="50" y2="48"/>
          <line x1="14" y1="22" x2="50" y2="22"/><line x1="14" y1="30" x2="50" y2="30"/>
          <line x1="14" y1="38" x2="50" y2="38"/><line x1="14" y1="46" x2="50" y2="46"/>
        </g>
        <rect x="11" y="14" width="42" height="36" rx="2" fill="none" stroke="${C.accent}" stroke-width="2.6"/>
        <circle cx="44" cy="42" r="8" fill="${C.accent}"/>`
    },
  ];

  const grid = document.getElementById('grid');
  ICONS.forEach((ic, i) => {
    const n = String(i+1).padStart(2,'0');
    const svg = (cls) => `<svg viewBox="0 0 64 64" class="${cls||''}">${ic.svg}</svg>`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="num">${n}</span>
        <span class="name">${ic.name}</span>
      </div>
      <div class="stage">
        <div class="hero">${svg()}</div>
        <div class="sizes">
          <div class="szcol"><div class="sz s32">${svg()}</div><span class="szlbl">32px</span></div>
          <div class="szcol"><div class="sz s16">${svg()}</div><span class="szlbl">16px</span></div>
        </div>
      </div>
      <div class="tabwrap">
        <div class="tab">
          <span class="fav">${svg()}</span>
          <span class="ttl">FPL Squad Viewer</span>
          <span class="x">×</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  </script>
</body>
</html>
