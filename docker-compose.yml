services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fpl
      POSTGRES_PASSWORD: fpl
      POSTGRES_DB: fpl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpl -d fpl"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://fpl:fpl@postgres:5432/fpl
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
