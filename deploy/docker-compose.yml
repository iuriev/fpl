services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - proxy

  proxy:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: node dist/index.js
    volumes:
      - ./proxy:/app:ro
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
