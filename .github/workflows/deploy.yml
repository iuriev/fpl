name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --silent

      - run: npm run build -w web

      - name: Copy web to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/dist/"
          target: "/opt/fpl/web/"
          strip_components: 2

      - name: Copy proxy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "proxy/src/,proxy/package.json"
          target: "/opt/fpl/proxy/"
          strip_components: 1

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,BETTER_AUTH_SECRET,PUBLIC_APP_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            cd /opt/fpl
            printf "POSTGRES_DB=fpl\nPOSTGRES_USER=fpl-admin\nPOSTGRES_PASSWORD=%s\nDATABASE_URL=postgresql://fpl-admin:%s@db:5432/fpl\nPORT=3000\nNODE_ENV=production\nBETTER_AUTH_SECRET=%s\nPUBLIC_APP_URL=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\n" \
              "$POSTGRES_PASSWORD" "$POSTGRES_PASSWORD" "$BETTER_AUTH_SECRET" "$PUBLIC_APP_URL" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" > .env
            docker compose up -d --force-recreate proxy caddy
