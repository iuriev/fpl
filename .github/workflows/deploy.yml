name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --silent

      - run: npm run build -w web

      - name: Copy web to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/dist/"
          target: "/opt/fpl/web/"
          strip_components: 2

      - name: Copy proxy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "proxy/src/,proxy/scripts/,proxy/data/,proxy/package.json"
          target: "/opt/fpl/proxy/"
          strip_components: 1

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TRUSTED_ORIGINS: ${{ secrets.TRUSTED_ORIGINS }}
          LINEUPS_WARMUP_START_DELAY_MS: ${{ vars.LINEUPS_WARMUP_START_DELAY_MS }}
          LINEUPS_SEED_ON_START: ${{ vars.LINEUPS_SEED_ON_START }}
          LINEUPS_WARMUP_ENABLED: ${{ vars.LINEUPS_WARMUP_ENABLED }}
          PREDICTIONS_WARMUP_ENABLED: ${{ vars.PREDICTIONS_WARMUP_ENABLED }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,BETTER_AUTH_SECRET,PUBLIC_APP_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,RESEND_API_KEY,FROM_EMAIL,TRUSTED_ORIGINS,LINEUPS_WARMUP_START_DELAY_MS,LINEUPS_SEED_ON_START,LINEUPS_WARMUP_ENABLED,PREDICTIONS_WARMUP_ENABLED
          script: |
            cd /opt/fpl
            printf "POSTGRES_DB=fpl\nPOSTGRES_USER=fpl-admin\nPOSTGRES_PASSWORD=%s\nDATABASE_URL=postgresql://fpl-admin:%s@db:5432/fpl\nPORT=3000\nNODE_ENV=production\nBETTER_AUTH_SECRET=%s\nPUBLIC_APP_URL=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nRESEND_API_KEY=%s\nFROM_EMAIL=%s\nTRUSTED_ORIGINS=%s\nLINEUPS_WARMUP_START_DELAY_MS=%s\nLINEUPS_SEED_ON_START=%s\nLINEUPS_WARMUP_ENABLED=%s\nPREDICTIONS_WARMUP_ENABLED=%s\n" \
              "$POSTGRES_PASSWORD" "$POSTGRES_PASSWORD" "$BETTER_AUTH_SECRET" "$PUBLIC_APP_URL" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" "$RESEND_API_KEY" "$FROM_EMAIL" "$TRUSTED_ORIGINS" "$LINEUPS_WARMUP_START_DELAY_MS" "$LINEUPS_SEED_ON_START" "$LINEUPS_WARMUP_ENABLED" "$PREDICTIONS_WARMUP_ENABLED" > proxy/.env
            docker compose up -d --force-recreate proxy caddy
            docker compose exec -T proxy npm run pred:ingest
